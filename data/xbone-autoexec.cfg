// ioQuake3 Xbox One (Dev Mode) — ANGLE/D3D11 autoexec
// Place this file in LocalState\baseq3\autoexec.cfg via the Device Portal
// after deploying the package.

// --- Renderer: opengl2 with GLES2/ANGLE path ---
// ANGLE exposes OpenGL ES 2, so we must use opengl2 renderer and prefer GLES.
seta cl_renderer          "opengl2"
seta r_preferOpenGLES     "1"

// --- Feature level cap: D3D11 FL 10.1 on Xbox One ---
// Disable features that map to D3D11.x-only or require SM5 beyond FL10.1.
seta r_ext_framebuffer_object       "1"   // FBO present in FL10+
seta r_ext_texture_filter_anisotropic "1" // present in FL10+
seta r_arb_seamless_cube_map        "0"   // requires GL 3.2 / FL10.1 — disable to be safe
seta r_ext_texture_float            "0"   // may not resolve cleanly on FL10.1 ANGLE
seta r_hdr                          "0"   // HDR path uses float render targets; disable initially
seta r_pbr                          "0"   // PBR also hits float RT; disable initially

// --- Resolution: Xbox One outputs at 1080p maximum via UWP ---
seta r_mode          "-2"    // auto-detect desktop resolution (1920x1080 on X1)
seta r_fullscreen    "1"

// --- Performance: stay within 1 GB app-mode RAM budget ---
// Register as a game (expandedResources in manifest) to raise this to 5 GB.
// Until confirmed working, keep texture quality conservative.
seta r_picmip        "1"
seta r_textureMode   "GL_LINEAR_MIPMAP_NEAREST"

// --- Controller input (no keyboard/mouse on a stock controller) ---
// Adjust these binds to taste.
seta in_joystickThreshold "0.15"
seta in_joystick          "1"

// --- Misc ---
seta com_maxfps      "60"
seta s_useOpenAL     "1"   // OpenAL-soft via libopenal-1.dll
